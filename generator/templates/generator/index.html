<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'generator/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="#">RecipeMaster</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-4">
            <h1 class="text-center mb-4">AI Recipe Generator</h1>
            <p class="text-center text-muted mb-4">Enter the ingredients you have, and let our AI create a delicious recipe for you!</p>
            <form id="recipe-form">
                {% csrf_token %}
                <div class="mb-3">
                    <textarea class="form-control" name="ingredients" placeholder="e.g., chicken breast, rice, broccoli, soy sauce" required></textarea>
                </div>
                <div class="mb-3">
                    <select class="form-select" name="diet">
                        <option value="none">No specific diet</option>
                        <option value="vegan">Vegan</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="gluten-free">Gluten-Free</option>
                        <option value="keto">Keto</option>
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Generate Recipe</button>
                </div>
            </form>
        </div>

        <div class="d-flex justify-content-center mt-4" id="loading-spinner" style="display: none;">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div id="recipe-result" class="mt-4" style="display: none;"></div>
    </div>

    <footer class="footer mt-auto py-3">
        <div class="container">
            <span class="text-muted">© 2026 RecipeMaster Inc. All Rights Reserved.</span>
        </div>
    </footer>

    <script>
        document.getElementById('recipe-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);
            const ingredients = formData.get('ingredients');
            const diet = formData.get('diet');
            const csrfToken = formData.get('csrfmiddlewaretoken');

            const resultDiv = document.getElementById('recipe-result');
            const loadingSpinner = document.getElementById('loading-spinner');

            resultDiv.style.display = 'none';
            loadingSpinner.style.display = 'block';

            fetch('/generate/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': csrfToken
                },
                body: new URLSearchParams({
                    'ingredients': ingredients,
                    'diet': diet
                })
            })
            .then(response => response.json())
            .then(data => {
                loadingSpinner.style.display = 'none';
                if (data.error) {
                    resultDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                } else {
                    const recipeHtml = `
                        <div class="card p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <h2 class="mb-0">${data.recipe_name}</h2>
                                <button class="btn btn-sm btn-outline-secondary" onclick="copyToClipboard()">Copy</button>
                            </div>
                            <hr>
                            <h3>Ingredients:</h3>
                            <ul class="list-group list-group-flush">
                                ${data.ingredients.map(ing => `<li class="list-group-item">${ing}</li>`).join('')}
                            </ul>
                            <h3 class="mt-4">Instructions:</h3>
                            <p>${data.instructions}</p>
                            <h3 class="mt-4">Nutritional Info:</h3>
                            <p>${data.nutritional_info}</p>
                        </div>
                    `;
                    resultDiv.innerHTML = recipeHtml;
                }
                resultDiv.style.display = 'block';
            })
            .catch(error => {
                loadingSpinner.style.display = 'none';
                resultDiv.innerHTML = `<div class="alert alert-danger">An unexpected error occurred. Please try again.</div>`;
                resultDiv.style.display = 'block';
                console.error('Error:', error);
            });
        });

        function copyToClipboard() {
            const recipeText = document.getElementById('recipe-result').innerText;
            navigator.clipboard.writeText(recipeText).then(() => {
                alert('Recipe copied to clipboard!');
            }, (err) => {
                console.error('Could not copy text: ', err);
            });
        }
    </script>
</body>
</html>
